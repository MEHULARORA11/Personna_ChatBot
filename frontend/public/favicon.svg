<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1912"/>
      <stop offset="100%" stop-color="#121210"/>
    </linearGradient>
  </defs>

  <!-- dark ink circle, matches the dark-mode header badge -->
  <circle cx="32" cy="32" r="31" fill="url(#ink)"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#d98b57" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- P letterform, same accent color as the header badge -->
  <text
    x="32"
    y="34"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="600"
    font-size="34"
    fill="#d98b57"
  >P</text>
</svg>
